name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update the release

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             lift-android-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lift-android-debug
          path: lift-android-debug.apk
          retention-days: 90

      # ── Rolling "latest" release — always points to the newest build ──────────
      - name: Delete previous latest-apk release (if exists)
        run: gh release delete latest-apk --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete previous latest-apk tag (if exists)
        run: git push origin :refs/tags/latest-apk 2>/dev/null || true

      - name: Create latest-apk release
        run: |
          gh release create latest-apk lift-android-debug.apk \
            --title "Lift Android APK — latest build" \
            --notes "$(cat <<'NOTES'
          ## Lift — Android Debug APK

          **Auto-built from `main` branch** — commit ${{ github.sha }}

          ### How to install
          1. On your Android phone, go to **Settings → Apps → Special app access → Install unknown apps**
          2. Allow installs from your browser or file manager
          3. Download `lift-android-debug.apk` from this release
          4. Open the downloaded file and tap **Install**

          ### What this APK does
          - Opens the Lift PWA (`blayalems.github.io/lift`) in a full-screen WebView
          - Shows an Android 16 **Live Update** notification during workouts:
            - Coloured status-bar chip with rest countdown or elapsed time
            - Accent-coloured notification card matching the Lift theme
            - Action buttons: −15 s / Skip rest / +15 s / Logged it / Finish
          - Notification actions feed back into the PWA in real time

          > **Note:** This is a debug build (not Play Store signed). It is safe to install and use; it just hasn't gone through Play Store review.
          NOTES
          )" \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
