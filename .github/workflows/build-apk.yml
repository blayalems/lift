name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install required Android SDK components
        run: |
          # GitHub-hosted runners ship the Android SDK at $ANDROID_SDK_ROOT.
          # Install the exact platform + build-tools the project needs.
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools" 2>&1 | tail -5

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: android
        run: |
          # Tell AGP where the Android SDK lives (most reliable method on CI)
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             lift-android-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lift-android-debug
          path: lift-android-debug.apk
          retention-days: 90

      # ── Rolling "latest" release ─────────────────────────────────────────────
      - name: Delete previous latest-apk release (if exists)
        run: gh release delete latest-apk --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete previous latest-apk tag (if exists)
        run: git push origin :refs/tags/latest-apk 2>/dev/null || true

      - name: Create latest-apk release
        run: |
          gh release create latest-apk lift-android-debug.apk \
            --title "Lift Android APK — latest build" \
            --notes "## Lift — Android Debug APK

          Built from commit \`${{ github.sha }}\`

          ### How to install
          1. On your Android phone go to **Settings → Apps → Special app access → Install unknown apps**
          2. Allow installs from your browser or file manager
          3. Download \`lift-android-debug.apk\` below and tap **Install**

          ### What this APK does
          - Opens the Lift PWA in a full-screen native wrapper
          - Live Update notification during workouts: coloured status-bar chip, accent card, action buttons (−15 s / Skip rest / +15 s / Logged it / Finish)
          - Notification actions feed back into the PWA in real time

          > Debug build — safe to sideload; not Play Store signed." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
