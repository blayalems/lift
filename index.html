<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1,viewport-fit=cover" />
  <meta name="description" content="Offline progressive overload workout tracker for the May-June 2026 cycle." />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafafa" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0a" />
  <meta id="theme-color-active" name="theme-color" content="#fafafa" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,600;8..144,700;8..144,800;8..144,900&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lift" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <title>Lift - Progressive Overload</title>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem("lift.v2.theme");
        var theme = stored || "system";
        var resolved = theme === "system"
          ? (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : theme;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.themeChoice = theme;
        var meta = document.getElementById("theme-color-active");
        if (meta) meta.setAttribute("content", resolved === "dark" ? "#0a0a0a" : "#fafafa");
      } catch (err) {
        document.documentElement.dataset.theme = "light";
        document.documentElement.dataset.themeChoice = "system";
      }
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f4f7;
      --bg-elev: rgba(255, 255, 255, 0.78);
      --bg-soft: rgba(236, 236, 241, 0.68);
      --bg-wash: #fafafd;
      --fg: #101014;
      --fg-dim: #64646f;
      --fg-faint: #9696a0;
      --line: rgba(255, 255, 255, 0.62);
      --line-strong: rgba(16, 16, 20, 0.16);
      --glass: rgba(255, 255, 255, 0.52);
      --glass-strong: rgba(255, 255, 255, 0.76);
      --glass-soft: rgba(255, 255, 255, 0.34);
      --glass-border: rgba(255, 255, 255, 0.74);
      --glass-shadow: 0 18px 46px -30px rgba(58, 76, 115, 0.62), inset 0 1px 0 rgba(255,255,255,.68);
      --accent: #e63b5d;
      --accent-2: #e98919;
      --green: #2fa862;
      --blue: #1678d6;
      --teal: #1b9a9a;
      --amber: #b67518;
      --purple: #7b5ac7;
      --gray: #777982;
      --danger: #c73e3e;
      --shadow-card: 0 1px 2px rgba(16, 16, 20, 0.04), 0 22px 46px -30px rgba(58, 76, 115, 0.56);
      --radius: 18px;
      --radius-sm: 12px;
      --radius-lg: 28px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
      --tap: 44px;
      --app-max: 480px;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #111114;
      --bg-elev: rgba(24, 26, 36, 0.7);
      --bg-soft: rgba(44, 48, 63, 0.55);
      --bg-wash: #17171b;
      --fg: #f5f5f7;
      --fg-dim: #b1b1ba;
      --fg-faint: #7b7b86;
      --line: rgba(255, 255, 255, 0.14);
      --line-strong: rgba(255, 255, 255, 0.18);
      --glass: rgba(31, 35, 48, 0.56);
      --glass-strong: rgba(40, 45, 62, 0.72);
      --glass-soft: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.18);
      --glass-shadow: 0 22px 60px -36px rgba(0,0,0,.92), inset 0 1px 0 rgba(255,255,255,.12);
      --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.42), 0 18px 44px -30px rgba(0, 0, 0, 0.88);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; min-height: 100%; background: var(--bg); color: var(--fg); }
    body {
      min-height: 100dvh;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-feature-settings: "tnum";
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overscroll-behavior-y: contain;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: -18%;
      z-index: -2;
      pointer-events: none;
      background:
        linear-gradient(115deg, rgba(21, 119, 220, .24), transparent 34%),
        linear-gradient(205deg, rgba(34, 183, 173, .22), transparent 42%),
        linear-gradient(315deg, rgba(230, 59, 93, .20), rgba(233, 137, 25, .18) 38%, transparent 68%),
        var(--bg);
      filter: blur(34px) saturate(1.25);
      transform: translateZ(0);
    }
    html[data-theme="dark"] body::before {
      background:
        linear-gradient(120deg, rgba(22, 120, 214, .30), transparent 35%),
        linear-gradient(210deg, rgba(20, 143, 137, .26), transparent 45%),
        linear-gradient(320deg, rgba(194, 73, 114, .23), rgba(123, 90, 199, .24) 42%, transparent 70%),
        var(--bg);
      filter: blur(38px) saturate(1.35);
    }
    body.sheet-open { overflow: hidden; }
    button, input, select, textarea { font: inherit; color: inherit; }
    button { border: 0; background: none; cursor: pointer; }
    input, select, textarea { border-radius: 12px; border: 1px solid var(--line); background: var(--bg-elev); }
    input:focus, select:focus, textarea:focus, button:focus-visible { outline: 2px solid color-mix(in oklab, var(--accent) 55%, transparent); outline-offset: 2px; }
    svg { display: block; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

    #app {
      width: 100%;
      max-width: var(--app-max);
      min-height: 100dvh;
      margin: 0 auto;
      padding-bottom: calc(132px + var(--safe-bot));
      background: transparent;
    }

    .app-empty {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 32px;
      color: var(--fg-dim);
      text-align: center;
      line-height: 1.5;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      padding: calc(env(safe-area-inset-top, 0px) + 14px) 18px 12px;
      background: color-mix(in oklab, var(--glass-strong) 78%, transparent);
      border-bottom: 1px solid var(--glass-border);
      -webkit-backdrop-filter: saturate(190%) blur(30px);
      backdrop-filter: saturate(190%) blur(30px);
    }
    .topbar-row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 12px; }
    .eyebrow { color: var(--fg-dim); font-size: 12px; font-weight: 760; letter-spacing: 0; text-transform: uppercase; }
    .title { margin-top: 1px; font-size: 26px; font-weight: 850; letter-spacing: 0; line-height: 1.04; }
    .top-actions { display: flex; align-items: center; gap: 8px; }
    .chip-btn, .icon-btn {
      min-height: 38px;
      border-radius: 999px;
      background: var(--glass);
      color: var(--fg);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-weight: 760;
      transition: transform .45s cubic-bezier(.34,1.56,.64,1), background .14s ease, border-color .14s ease;
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.38);
      -webkit-backdrop-filter: saturate(180%) blur(22px);
      backdrop-filter: saturate(180%) blur(22px);
    }
    .chip-btn { padding: 0 12px; font-size: 13px; white-space: nowrap; }
    .icon-btn { width: 38px; height: 38px; padding: 0; }
    .chip-btn:active, .icon-btn:active { transform: scale(0.93); transition: transform .08s ease, background .08s ease, border-color .08s ease; }
    .hero-btn:active, .tool-btn:active { transform: scale(0.96); transition: transform .08s ease, background .08s ease; }
    .set-btn:active { transform: scale(0.92); transition: transform .08s ease; }
    .icon-btn svg, .chip-btn svg { width: 17px; height: 17px; }

    .week-strip, .day-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 14px 18px 4px;
      scrollbar-width: none;
      scroll-padding-inline: 18px;
    }
    .week-strip::-webkit-scrollbar, .day-strip::-webkit-scrollbar { display: none; }
    .week-tab {
      flex: 0 0 auto;
      min-width: 92px;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--glass);
      text-align: left;
      box-shadow: var(--glass-shadow);
      -webkit-backdrop-filter: saturate(180%) blur(22px);
      backdrop-filter: saturate(180%) blur(22px);
    }
    .week-tab .week-num { font-size: 13px; font-weight: 820; }
    .week-tab .week-range { margin-top: 2px; font-size: 11px; color: var(--fg-dim); font-weight: 680; }
    .week-tab[data-active="true"] { color: white; border-color: transparent; }
    .week-tab[data-phase="consolidate"][data-active="true"] { background: linear-gradient(135deg, #ff8a1d, #e34b43); }
    .week-tab[data-phase="load"][data-active="true"], .week-tab[data-phase="loadplus"][data-active="true"] { background: linear-gradient(135deg, #09b5be, #2478f2); }
    .week-tab[data-phase="deload"][data-active="true"] { background: linear-gradient(135deg, #7d8394, #4c5568); }
    .week-tab[data-phase="test"][data-active="true"] { background: linear-gradient(135deg, #9b4dff, #e4488b); }
    .week-tab[data-active="true"] .week-range { color: rgba(255,255,255,0.78); }

    .phase-row { padding: 8px 18px 6px; display: flex; align-items: center; justify-content: space-between; gap: 10px; color: var(--fg-dim); font-size: 13px; }
    .phase-badge, .tag {
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 11px;
      font-weight: 820;
      letter-spacing: 0;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .phase-badge[data-phase="consolidate"], .tag[data-tag="sets"], .tag[data-tag="load"], .tag[data-tag="jump"] { background: color-mix(in oklab, var(--teal) 14%, transparent); color: var(--teal); }
    .phase-badge[data-phase="load"], .phase-badge[data-phase="loadplus"] { background: color-mix(in oklab, var(--teal) 16%, transparent); color: var(--teal); }
    .phase-badge[data-phase="deload"] { background: color-mix(in oklab, var(--gray) 18%, transparent); color: var(--fg-dim); }
    .phase-badge[data-phase="test"] { background: color-mix(in oklab, var(--purple) 18%, transparent); color: var(--purple); }
    .tag[data-tag="pr-target"], .tag[data-tag="pr-attempt"], .tag[data-tag="new-bracket"] { background: color-mix(in oklab, var(--green) 16%, transparent); color: var(--green); }

    .day-pill {
      position: relative;
      flex: 0 0 auto;
      min-width: 62px;
      padding: 10px 7px 14px;
      border-radius: 16px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      text-align: center;
      box-shadow: var(--glass-shadow);
      -webkit-backdrop-filter: saturate(180%) blur(22px);
      backdrop-filter: saturate(180%) blur(22px);
      transition: transform .45s cubic-bezier(.34,1.56,.64,1), background .14s ease, border-color .14s ease;
    }
    .day-pill[data-today="true"] { box-shadow: 0 0 0 2px color-mix(in oklab, var(--accent) 36%, transparent); }
    .day-pill[data-active="true"] { background: rgba(15, 16, 24, .88); color: #fff; border-color: rgba(255,255,255,.28); box-shadow: 0 18px 36px -24px rgba(230,59,93,.75), inset 0 1px 0 rgba(255,255,255,.18); }
    .day-pill .dow { color: var(--fg-dim); font-size: 11px; font-weight: 820; letter-spacing: 0; text-transform: uppercase; }
    .day-pill[data-active="true"] .dow { color: color-mix(in oklab, var(--bg) 78%, transparent); }
    .day-pill .dom { margin-top: 2px; font-size: 20px; font-weight: 840; letter-spacing: 0; }
    .status-dot {
      position: absolute;
      left: 50%;
      bottom: 6px;
      transform: translateX(-50%);
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: var(--fg-faint);
    }
    .day-pill[data-status="partial"] .status-dot { background: var(--amber); }
    .day-pill[data-status="done"] .status-dot { background: var(--green); }
    .day-pill[data-active="true"] .status-dot { background: currentColor; opacity: .7; }

    .hero {
      margin: 12px 18px 16px;
      border-radius: var(--radius-lg);
      padding: 22px;
      color: white;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(255,255,255,.20), transparent 32%),
        linear-gradient(315deg, rgba(0,0,0,.28), transparent 58%),
        linear-gradient(135deg, #ff3f6a, #ff8b1f);
      border: 1px solid rgba(255,255,255,.38);
      box-shadow: 0 26px 70px -34px rgba(230, 59, 93, .9), inset 0 1px 0 rgba(255,255,255,.34);
      -webkit-backdrop-filter: saturate(180%) blur(18px);
      backdrop-filter: saturate(180%) blur(18px);
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent),
        linear-gradient(180deg, rgba(255,255,255,.12), transparent 42%);
      mix-blend-mode: screen;
    }
    .hero > * { position: relative; z-index: 1; }
    .hero[data-type="pull"] { background: linear-gradient(135deg, rgba(255,255,255,.20), transparent 32%), linear-gradient(315deg, rgba(0,0,0,.24), transparent 60%), linear-gradient(135deg, #0788f5, #6e5cff); box-shadow: 0 26px 70px -34px rgba(22,120,214,.92), inset 0 1px 0 rgba(255,255,255,.34); }
    .hero[data-type="ham"] { background: linear-gradient(135deg, rgba(255,255,255,.21), transparent 32%), linear-gradient(315deg, rgba(0,0,0,.22), transparent 60%), linear-gradient(135deg, #ff712b, #ffd23d); box-shadow: 0 26px 70px -34px rgba(255,113,43,.9), inset 0 1px 0 rgba(255,255,255,.34); }
    .hero[data-type="push"], .hero[data-type="chest"] { background: linear-gradient(135deg, rgba(255,255,255,.20), transparent 32%), linear-gradient(315deg, rgba(0,0,0,.24), transparent 60%), linear-gradient(135deg, #9d4cff, #f13f84); box-shadow: 0 26px 70px -34px rgba(157,76,255,.92), inset 0 1px 0 rgba(255,255,255,.34); }
    .hero[data-type="primer"] { background: linear-gradient(135deg, rgba(255,255,255,.20), transparent 32%), linear-gradient(315deg, rgba(0,0,0,.24), transparent 60%), linear-gradient(135deg, #00b9ba, #23d1cf); box-shadow: 0 26px 70px -34px rgba(0,185,186,.92), inset 0 1px 0 rgba(255,255,255,.34); }
    .hero[data-type="rest"] { background: linear-gradient(135deg, rgba(255,255,255,.14), transparent 32%), linear-gradient(315deg, rgba(0,0,0,.25), transparent 60%), linear-gradient(135deg, #5d6676, #222936); box-shadow: 0 26px 70px -34px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.22); }
    .hero-kicker { font-size: 12px; font-weight: 820; letter-spacing: 0; text-transform: uppercase; opacity: .9; }
    .hero-title { margin-top: 5px; max-width: 14ch; font-size: 30px; font-weight: 880; letter-spacing: 0; line-height: 1.04; }
    .hero-sub { margin-top: 8px; max-width: 34ch; color: rgba(255,255,255,.82); font-size: 14px; line-height: 1.45; }
    .hero-meta { margin-top: 18px; display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; }
    .hero-stat .v { font-size: 21px; font-weight: 840; letter-spacing: 0; font-variant-numeric: tabular-nums; }
    .hero-stat .l { margin-top: 2px; opacity: .8; font-size: 10px; font-weight: 760; letter-spacing: 0; text-transform: uppercase; }
    .hero-progress { margin-top: 16px; height: 8px; background: rgba(255,255,255,.22); border-radius: 999px; overflow: hidden; }
    .hero-progress span { display: block; height: 100%; width: 0%; background: white; border-radius: inherit; transition: width .25s ease; }
    .hero-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
    .hero-btn {
      min-height: var(--tap);
      border-radius: 14px;
      padding: 0 12px;
      background: rgba(255,255,255,.20);
      color: white;
      font-size: 14px;
      font-weight: 780;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,.24);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.24);
      -webkit-backdrop-filter: saturate(180%) blur(18px);
      backdrop-filter: saturate(180%) blur(18px);
      transition: transform .45s cubic-bezier(.34,1.56,.64,1), background .14s ease;
    }
    .hero-btn.primary { background: rgba(255,255,255,.92); color: #141418; }
    .hero-btn svg { width: 17px; height: 17px; }

    .content { padding: 0 18px; display: grid; gap: 14px; }
    .notice, .warmup, .overview-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 15px;
      box-shadow: var(--shadow-card);
      -webkit-backdrop-filter: saturate(180%) blur(22px);
      backdrop-filter: saturate(180%) blur(22px);
    }
    .notice { border-color: color-mix(in oklab, var(--gray) 24%, var(--line)); background: color-mix(in oklab, var(--gray) 8%, var(--bg-elev)); }
    .notice strong, .warmup strong, .overview-card strong { display: block; font-size: 13px; letter-spacing: 0; text-transform: uppercase; color: var(--fg-dim); margin-bottom: 6px; }
    .notice p, .warmup p, .overview-card p { margin: 0; color: var(--fg-dim); font-size: 14px; line-height: 1.5; }
    .readiness-warn { border-color: color-mix(in oklab, var(--amber) 38%, var(--line)); background: color-mix(in oklab, var(--amber) 9%, var(--bg-elev)); }

    .section-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 4px 0; }
    .section-title { font-size: 18px; font-weight: 850; letter-spacing: 0; }
    .section-sub { margin-top: 2px; color: var(--fg-dim); font-size: 13px; }
    .link-btn { color: var(--accent); font-weight: 780; font-size: 13px; min-height: 36px; padding: 0 4px; }
    .exercise-grid { display: grid; gap: 12px; }

    .ex-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      -webkit-backdrop-filter: saturate(180%) blur(22px);
      backdrop-filter: saturate(180%) blur(22px);
    }
    .ex-card[data-complete="true"] { border-color: color-mix(in oklab, var(--green) 24%, var(--line)); }
    .ex-card[data-caveat="true"] { border-color: color-mix(in oklab, var(--amber) 42%, var(--line)); box-shadow: 0 0 0 2px color-mix(in oklab, var(--amber) 13%, transparent), var(--shadow-card); }
    .ex-head { padding: 16px 15px 12px; display: grid; grid-template-columns: 34px 1fr; gap: 11px; }
    .ex-num {
      width: 34px; height: 34px; border-radius: 12px; background: var(--glass-soft);
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--fg-dim); font-size: 14px; font-weight: 840;
    }
    .ex-card[data-complete="true"] .ex-num { background: color-mix(in oklab, var(--green) 16%, var(--bg-soft)); color: var(--green); }
    .ex-topline { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .ex-name { font-size: 16px; line-height: 1.24; font-weight: 840; letter-spacing: 0; }
    .ex-target { margin-top: 3px; color: var(--fg-dim); font-size: 13px; line-height: 1.35; }
    .ex-tags { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
    .primary-tag { background: color-mix(in oklab, var(--accent) 14%, transparent); color: var(--accent); }
    .last-hint { margin-top: 9px; font-size: 12px; color: var(--fg-dim); }
    .ex-actions { padding: 0 15px 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .tool-btn {
      min-height: 36px;
      border-radius: 999px;
      background: var(--glass-soft);
      padding: 0 12px;
      font-size: 12px;
      font-weight: 800;
      color: var(--fg);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: transform .45s cubic-bezier(.34,1.56,.64,1), background .14s ease;
    }
    .tool-btn.danger { color: var(--danger); background: color-mix(in oklab, var(--danger) 10%, var(--bg-soft)); }
    .tool-btn svg { width: 15px; height: 15px; }

    .sets { padding: 0 15px 13px; display: grid; gap: 8px; }
    .set-row {
      display: grid;
      grid-template-columns: 34px minmax(0,1.1fr) minmax(0,.9fr) 38px;
      align-items: center;
      gap: 8px;
      min-height: 58px;
      padding: 8px;
      border-radius: 14px;
      background: var(--glass-soft);
    }
    .set-row[data-done="true"] { background: color-mix(in oklab, var(--green) 15%, var(--bg-soft)); }
    .set-row[data-pr="true"] { box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--green) 32%, transparent); }
    .set-label { font-size: 12px; font-weight: 850; color: var(--fg-dim); text-align: center; }
    .set-row[data-done="true"] .set-label { color: var(--green); }
    .number-control {
      min-width: 0;
      display: grid;
      grid-template-columns: 26px minmax(0,1fr) 26px;
      align-items: center;
      gap: 3px;
      background: color-mix(in oklab, var(--glass-strong) 74%, transparent);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      min-height: 42px;
      overflow: hidden;
    }

    .nav-drawer-meta { line-height: 1.2; }
    .nav-drawer-meta strong { display: block; font-size: 18px; font-variation-settings: "wght" 750; }
    .nav-drawer-meta span { display: block; color: var(--md-on-surface-variant); font-size: 12px; margin-top: 2px; }
    .nav-drawer-body { overflow-y: auto; padding: 10px 12px 18px; display: grid; gap: 4px; }
    .nav-section-head {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-variation-settings: "wght" 700;
      color: var(--md-on-surface-variant);
      padding: 14px 14px 8px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border-radius: var(--md-shape-full);
      color: var(--md-on-surface);
      font-variation-settings: "wght" 600;
      font-size: 14px;
      text-align: left;
      transition: background .15s ease;
    }
    .nav-item:hover { background: color-mix(in oklab, var(--md-on-surface) 6%, transparent); }
    .nav-item[data-active="true"] {
      background: var(--md-secondary-container);
      color: var(--md-on-secondary-container);
    }
    .nav-item svg { width: 22px; height: 22px; }
    .nav-drawer-foot {
      border-top: 1px solid var(--md-outline-variant);
      padding: 12px 14px calc(14px + env(safe-area-inset-bottom, 0px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--md-on-surface-variant);
      font-size: 12px;
    }
    .nav-drawer-foot .icon-btn {
      width: 38px; height: 38px;
      background: color-mix(in oklab, var(--md-surface-container-high) 92%, transparent);
      border-color: var(--md-outline-variant);
    }

    /* ---------- Quick-add custom exercise sheet ---------- */
    .quick-add-grid { display: grid; gap: 14px; }
    .qa-presets { display: flex; gap: 8px; flex-wrap: wrap; }
    .qa-preset {
      padding: 9px 14px;
      border-radius: var(--md-shape-full);
      background: color-mix(in oklab, var(--md-surface-container-high) 90%, transparent);
      border: 1px solid var(--md-outline-variant);
      color: var(--md-on-surface);
      font-size: 13px;
      font-variation-settings: "wght" 600;
    }
    .qa-preset[data-active="true"] {
      background: var(--md-secondary-container);
      color: var(--md-on-secondary-container);
      border-color: transparent;
    }

    /* ---------- Body measurements ---------- */
    .measure-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .measure-card {
      background: var(--md-surface-container);
      border: 1px solid var(--md-outline-variant);
      border-radius: var(--md-shape-lg);
      padding: 14px;
      display: grid;
      gap: 6px;
    }
    .measure-card label {
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--md-on-surface-variant);
      font-variation-settings: "wght" 700;
    }
    .measure-card .measure-val {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-size: 22px;
      font-variation-settings: "wght" 750;
      color: var(--md-on-surface);
    }
    .measure-card .measure-val .unit { font-size: 12px; color: var(--md-on-surface-variant); font-variation-settings: "wght" 600; }
    .measure-card .measure-delta { font-size: 11px; color: var(--md-on-surface-variant); }
    .measure-card .measure-delta[data-trend="up"] { color: var(--md-success); }
    .measure-card .measure-delta[data-trend="down"] { color: var(--md-error); }
    .measure-input-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      align-items: end;
    }

    /* ---------- Calendar month view ---------- */
    .cal-month {
      background: var(--md-surface-container);
      border: 1px solid var(--md-outline-variant);
      border-radius: var(--md-shape-xl);
      padding: 16px;
    }
    .cal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-head strong { font-size: 18px; font-variation-settings: "wght" 750; }
    .cal-head .cal-nav { display: flex; gap: 6px; }
    .cal-head .icon-btn { width: 36px; height: 36px; }
    .cal-dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 6px;
    }
    .cal-dow {
      text-align: center;
      font-size: 11px;
      color: var(--md-on-surface-variant);
      font-variation-settings: "wght" 700;
      letter-spacing: 0.04em;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-cell {
      aspect-ratio: 1;
      border-radius: 14px;
      background: transparent;
      color: var(--md-on-surface);
      display: grid;
      place-items: center;
      font-size: 14px;
      font-variation-settings: "wght" 600;
      position: relative;
      transition: background .2s ease, transform .25s var(--md-spring-bounce);
    }
    .cal-cell[data-other="true"] { color: var(--md-on-surface-variant); opacity: 0.4; }
    .cal-cell[data-status="done"] {
      background: linear-gradient(135deg, var(--md-primary), var(--md-secondary));
      color: #fff;
    }
    .cal-cell[data-status="partial"] {
      background: var(--md-secondary-container);
      color: var(--md-on-secondary-container);
    }
    .cal-cell[data-status="planned"] {
      background: color-mix(in oklab, var(--md-tertiary) 18%, transparent);
      color: var(--md-on-surface);
    }
    .cal-cell[data-today="true"] {
      box-shadow: inset 0 0 0 2px var(--md-primary);
    }
    .cal-cell:active { transform: scale(0.92); }
    .cal-legend {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
      color: var(--md-on-surface-variant);
      font-size: 11px;
    }
    .cal-legend span { display: inline-flex; align-items: center; gap: 6px; }
    .cal-legend .dot {
      width: 10px; height: 10px; border-radius: 4px;
    }

    /* ---------- Marketplace cards ---------- */
    .market-list { display: grid; gap: 12px; }
    .market-card {
      background: var(--md-surface-container);
      border: 1px solid var(--md-outline-variant);
      border-radius: var(--md-shape-xl);
      padding: 16px;
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 14px;
      align-items: center;
      text-align: left;
    }
    .market-thumb {
      width: 56px; height: 56px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      color: #fff;
      font-variation-settings: "wght" 900;
      font-size: 14px;
      letter-spacing: 0.06em;
    }
    .market-card[data-vibe="strength"] .market-thumb { background: linear-gradient(135deg, #c43154, #855799); }
    .market-card[data-vibe="hypertrophy"] .market-thumb { background: linear-gradient(135deg, #b85c2a, #c43154); }
    .market-card[data-vibe="endurance"] .market-thumb { background: linear-gradient(135deg, #1d8c3e, #009aa0); }
    .market-card[data-vibe="mobility"] .market-thumb { background: linear-gradient(135deg, #855799, #4c5568); }
    .market-card[data-vibe="quick"] .market-thumb { background: linear-gradient(135deg, #b67518, #ff9500); }
    .market-meta strong { display: block; font-size: 15px; font-variation-settings: "wght" 740; }
    .market-meta span { display: block; color: var(--md-on-surface-variant); font-size: 12px; margin-top: 3px; line-height: 1.35; }
    .market-meta .market-tags { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
    .market-meta .market-tags .tag {
      background: color-mix(in oklab, var(--md-tertiary-container) 80%, transparent);
      color: var(--md-on-tertiary-container);
    }

    /* ---------- Readiness sheet polish ---------- */
    .readiness-grid { display: grid; gap: 14px; }
    .readiness-cluster {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .readiness-cluster button {
      padding: 14px 12px;
      border-radius: var(--md-shape-md);
      background: var(--md-surface-container);
      border: 1px solid var(--md-outline-variant);
      color: var(--md-on-surface);
      text-align: left;
      font-variation-settings: "wght" 600;
      font-size: 13px;
    }
    .readiness-cluster button[data-active="true"] {
      background: var(--md-primary-container);
      color: var(--md-on-primary-container);
      border-color: transparent;
    }
    .readiness-cluster .ic { font-size: 22px; line-height: 1; margin-bottom: 4px; display: block; }

    /* ---------- Form video chip on exercise card ---------- */
    .tool-btn.form-link svg { color: var(--md-tertiary); }

    /* ---------- Plate calculator stacked plates viz ---------- */
    .plate-viz {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1px;
      height: 110px;
      padding: 18px 12px;
      background: var(--md-surface-container-low);
      border: 1px solid var(--md-outline-variant);
      border-radius: var(--md-shape-xl);
      margin: 6px 0;
      overflow-x: auto;
    }
    .plate-bar { width: 4px; height: 14px; background: var(--md-outline); border-radius: 1px; }
    .plate {
      width: 16px;
      border-radius: 3px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 10px;
      font-variation-settings: "wght" 800;
      flex-shrink: 0;
    }
    .plate[data-kg="25"] { height: 96px; background: #d62828; }
    .plate[data-kg="20"] { height: 88px; background: #1b6ad6; }
    .plate[data-kg="15"] { height: 76px; background: #f4a300; }
    .plate[data-kg="10"] { height: 64px; background: #1d8c3e; }
    .plate[data-kg="5"]  { height: 50px; background: #aaaaaa; width: 14px; }
    .plate[data-kg="2.5"]  { height: 38px; background: #d62828; width: 12px; }
    .plate[data-kg="1.25"] { height: 28px; background: #1b6ad6; width: 10px; }
    .plate-collar {
      width: 8px; height: 18px;
      background: var(--md-outline);
      border-radius: 2px;
    }

    /* ---------- Health export sheet ---------- */
    .health-target-row {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-radius: var(--md-shape-lg);
      background: var(--md-surface-container);
      border: 1px solid var(--md-outline-variant);
    }
    .health-icon {
      width: 56px; height: 56px;
      border-radius: 18px;
      display: grid; place-items: center;
      color: #fff;
      font-size: 24px;
    }
    .health-icon[data-target="apple"] { background: linear-gradient(135deg, #fa3c4c, #ff6c6c); }
    .health-icon[data-target="google"] { background: linear-gradient(135deg, #4285f4, #34a853); }
    .health-icon[data-target="strava"] { background: linear-gradient(135deg, #fc4c02, #ff8b1f); }
    .health-icon[data-target="generic"] { background: linear-gradient(135deg, #533c64, #855799); }
    .health-meta strong { display: block; font-size: 15px; font-variation-settings: "wght" 740; }
    .health-meta span { display: block; color: var(--md-on-surface-variant); font-size: 12px; margin-top: 3px; }

    /* ---------- 1RM estimator UI ---------- */
    .est-card {
      background: linear-gradient(135deg, var(--md-primary-container), var(--md-tertiary-container));
      color: var(--md-on-primary-container);
      border-radius: var(--md-shape-xl);
      padding: 18px;
      border: 0;
    }
    .est-card .est-big {
      font-size: 44px;
      font-variation-settings: "wght" 860;
      letter-spacing: -0.03em;
      line-height: 1;
      font-feature-settings: "tnum";
    }
    .est-card .est-label { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; font-variation-settings: "wght" 700; opacity: .8; margin-top: 6px; }
    .est-card .est-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 14px;
    }
    .est-card .est-row > div { display: grid; gap: 4px; }
    .est-card .est-row strong { font-size: 18px; font-variation-settings: "wght" 750; }
    .est-card .est-row small { font-size: 11px; opacity: .75; letter-spacing: 0.04em; text-transform: uppercase; font-variation-settings: "wght" 700; }

    /* ---------- Streak ring (weekly target) ---------- */
    .streak-ring-card {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 18px;
      align-items: center;
      padding: 18px;
      background: var(--md-surface-container);
      border: 1px solid var(--md-outline-variant);
      border-radius: var(--md-shape-xl);
    }
    .streak-ring { width: 110px; height: 110px; position: relative; }
    .streak-ring svg { width: 110px; height: 110px; transform: rotate(-90deg); }
    .streak-ring .track { stroke: var(--md-outline-variant); fill: none; stroke-width: 12; }
    .streak-ring .bar { stroke: var(--md-primary); stroke-width: 12; stroke-linecap: round; fill: none; transition: stroke-dashoffset .35s var(--md-emphasized); }
    .streak-ring .label-num {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 32px;
      font-variation-settings: "wght" 800;
      line-height: 1;
      color: var(--md-on-surface);
    }
    .streak-meta strong { display: block; font-size: 16px; font-variation-settings: "wght" 740; }
    .streak-meta p { margin: 4px 0 0; color: var(--md-on-surface-variant); font-size: 13px; line-height: 1.4; }
    .streak-flames {
      margin-top: 8px;
      display: flex;
      gap: 4px;
      font-size: 14px;
    }
    .streak-flames span { opacity: 0.3; transition: opacity .3s var(--md-spring-bounce); }
    .streak-flames span[data-on="true"] { opacity: 1; }

    /* ---------- Sheet polish — M3 shape ---------- */
    .sheet {
      background: var(--md-surface-container-low);
      border-color: var(--md-outline-variant);
      border-radius: 28px 28px 0 0;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }
    .sheet[data-type="menu"] {
      background: var(--md-surface-container-low);
    }
    .sheet-head {
      background: var(--md-surface-container-low);
      border-bottom-color: var(--md-outline-variant);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }
    .action-btn {
      border-radius: var(--md-shape-full);
      background: var(--md-primary);
      color: var(--md-on-primary);
      font-variation-settings: "wght" 700;
    }
    .action-btn.secondary {
      background: var(--md-secondary-container);
      color: var(--md-on-secondary-container);
    }
    .action-btn.danger {
      background: color-mix(in oklab, var(--md-error) 12%, var(--md-surface-container-high));
      color: var(--md-error);
    }
    .field-block input, .field-block select, .field-block textarea {
      background: var(--md-surface-container-lowest);
      border: 1px solid var(--md-outline-variant);
      border-radius: var(--md-shape-md);
      color: var(--md-on-surface);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }
    .field-block input:focus, .field-block select:focus, .field-block textarea:focus {
      outline: 2px solid var(--md-primary);
      outline-offset: 1px;
      border-color: transparent;
    }
    .segmented { background: var(--md-surface-container); border-radius: var(--md-shape-full); padding: 4px; }
    .segmented button { border-radius: var(--md-shape-full); }
    .segmented button[data-active="true"] {
      background: var(--md-secondary-container);
      color: var(--md-on-secondary-container);
    }

    /* ---------- Menu sheet retired — it's a drawer now ---------- */
    /* Keep menu sheet HTML usable if someone deep-links it. */

    /* ---------- Mobile-first tweaks ---------- */
    @media (max-width: 520px) {
      .topbar { padding-inline: 14px; }
      .topbar-row { gap: 6px; }
      .topbar .title { font-size: 20px; }
      .topbar .eyebrow { font-size: 10px; }
      .hero { margin: 12px 14px 16px; padding: 20px; border-radius: 28px; }
      .content { padding-inline: 14px; }
      .week-strip, .day-strip, .phase-row { padding-inline: 14px; }
      .chip-btn[data-action="today"] span { display: inline; }
    }

    /* On larger screens, lay things out wider but keep mobile-first patterns. */
    @media (min-width: 760px) {
      .bottom-nav { max-width: var(--app-max); }
      .nav-drawer { width: min(340px, 32vw); }
      .fab { right: max(16px, calc((100vw - var(--app-max)) / 2 + 24px)); }
    }

    /* ============================================================
       LIFT v1.4 — Page mode (drawer items + bottom nav open as
       full-page surfaces, not bottom-sheet modals).
       ============================================================ */

    /* Hero default: was red→orange, now monochrome charcoal — keeps
       data-type variants for workout-type signaling. */
    .hero {
      background:
        linear-gradient(135deg, rgba(255,255,255,.18), transparent 32%),
        linear-gradient(315deg, rgba(0,0,0,.30), transparent 60%),
        linear-gradient(135deg, #2c2c2e, #1c1c1e);
      box-shadow:
        0 22px 50px -28px rgba(0,0,0,.65),
        inset 0 1px 0 rgba(255,255,255,.18);
    }
    html[data-theme="dark"] .hero {
      background:
        linear-gradient(135deg, rgba(255,255,255,.12), transparent 32%),
        linear-gradient(315deg, rgba(0,0,0,.42), transparent 60%),
        linear-gradient(135deg, #38383a, #1c1c1c);
    }

    /* Page-mode sheet: drawer items + nav-tab destinations get this
       treatment. Slides in from the right, fills the viewport above
       the bottom nav (which stays visible), has its own top bar with
       a back arrow rather than a close X. */
    .sheet[data-mode="page"] {
      left: 50%;
      right: auto;
      bottom: 0;
      top: 0;
      transform: translate(-50%, 100%);
      width: 100%;
      max-width: var(--app-max);
      max-height: none;
      height: 100dvh;
      border-radius: 0;
      border: 0;
      background: var(--md-surface);
      box-shadow: none;
      transition: transform .42s var(--md-emphasized);
      padding-top: env(safe-area-inset-top, 0px);
    }
    .sheet[data-mode="page"][data-open="true"] {
      transform: translate(-50%, 0);
    }
    /* Hide grabber + bottom-sheet chrome when full page. */
    .sheet[data-mode="page"] .sheet-grabber { display: none; }
    .sheet[data-mode="page"] .sheet-head {
      background: var(--md-surface);
      border-bottom: 1px solid var(--md-outline-variant);
      padding: 12px 12px 12px 4px;
      grid-template-columns: 44px 1fr 44px;
      display: grid;
      align-items: center;
      gap: 8px;
      min-height: 64px;
    }
    .sheet[data-mode="page"] .sheet-title {
      font-size: 22px;
      font-variation-settings: "opsz" 28, "wght" 720;
      letter-spacing: -0.018em;
      text-align: left;
    }
    .sheet[data-mode="page"] .sheet-body {
      max-height: none;
      height: calc(100dvh - 64px - env(safe-area-inset-top, 0px) - var(--bottom-nav-h));
      padding: 18px 18px calc(28px + var(--bottom-nav-h) + var(--safe-bot));
      overflow-y: auto;
      background: var(--md-surface);
    }
    .sheet[data-mode="page"] .sheet-back {
      width: 44px;
      height: 44px;
      border-radius: var(--md-shape-full);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--md-on-surface);
      background: transparent;
      border: 0;
      transition: background .15s ease, transform .3s var(--md-spring-bounce);
    }
    .sheet[data-mode="page"] .sheet-back:active {
      background: color-mix(in oklab, var(--md-on-surface) 10%, transparent);
      transform: scale(0.92);
    }
    .sheet[data-mode="page"] .sheet-back svg { width: 22px; height: 22px; }

    /* In page mode the FAB clutters the surface — hide it. */
    .sheet[data-mode="page"][data-open="true"] ~ #fab,
    body:has(.sheet[data-mode="page"][data-open="true"]) #fab {
      transform: translateY(120px);
      opacity: 0;
      pointer-events: none;
    }

    /* Backdrop fades out when in page mode (page is opaque). */
    .sheet-backdrop[data-mode="page"] {
      background: transparent;
    }

    /* Hero on the today PAGE — keep card design but page-style padding. */
    .page-hero-wrap { padding: 4px 4px 14px; }
    .page-section {
      margin: 0 4px 18px;
    }
    .page-section + .page-section { margin-top: 0; }
    .page-h1 {
      font-family: "Roboto Flex", system-ui, sans-serif;
      font-variation-settings: "opsz" 36, "wght" 740;
      letter-spacing: -0.024em;
      font-size: 32px;
      line-height: 1.04;
      margin: 8px 4px 6px;
      color: var(--md-on-surface);
    }
    .page-lede {
      margin: 0 4px 18px;
      color: var(--md-on-surface-variant);
      font-size: 15px;
      line-height: 1.5;
      max-width: 56ch;
    }

    /* Heavy emphasis on monochrome content cards: less border tint, more
       elevation contrast. */
    .ex-card, .notice, .warmup, .overview-card, .rest-panel,
    .market-card, .health-target-row, .measure-card, .cal-month,
    .streak-ring-card, .est-card {
      border-color: var(--md-outline-variant);
    }
    .ex-card[data-complete="true"] {
      background: color-mix(in oklab, var(--md-success) 14%, var(--md-surface-container));
    }
    .est-card {
      background: linear-gradient(135deg, #1c1c1e, #38383a);
      color: #ebebed;
      border: 0;
    }
    html[data-theme="dark"] .est-card {
      background: linear-gradient(135deg, #ebebed, #d6d6d8);
      color: #1c1c1e;
    }
    .market-card[data-vibe="strength"] .market-thumb { background: linear-gradient(135deg, #1c1c1e, #48484a); }
    .market-card[data-vibe="hypertrophy"] .market-thumb { background: linear-gradient(135deg, #2c2c2e, #79797a); }
    .market-card[data-vibe="endurance"] .market-thumb { background: linear-gradient(135deg, #38383a, #c7c7c9); color: #1c1c1e; }
    .market-card[data-vibe="mobility"] .market-thumb { background: linear-gradient(135deg, #444446, #8a8a8c); }
    .market-card[data-vibe="quick"] .market-thumb { background: linear-gradient(135deg, #1c1c1e, #ebebed); color: #1c1c1e; }

    /* Health export icons retain a faint vendor accent so they read as
       BRANDED destinations — but desaturated to match monochrome system. */
    .health-icon[data-target="apple"] { background: linear-gradient(135deg, #2c2c2e, #48484a); }
    .health-icon[data-target="google"] { background: linear-gradient(135deg, #1c1c1e, #79797a); }
    .health-icon[data-target="strava"] { background: linear-gradient(135deg, #38383a, #8a8a8c); }
    .health-icon[data-target="generic"] { background: linear-gradient(135deg, #1c1c1e, #ebebed); color: #1c1c1e; }
  </style>
</head>
